<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Velvoria - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

                        "inverse-primary": "#c0c4e8",
                        "on-primary-fixed-variant": "#404562",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f5f3f3",
                        "on-surface": "#1b1c1c",
                        "tertiary": "#0b0907",
                        "tertiary-fixed": "#e8e1dc",
                        "on-secondary-fixed-variant": "#623e2f",
                        "secondary-container": "#ffc9b4",
                        "outline-variant": "#c7c5ce",
                        "on-primary-fixed": "#151a34",
                        "on-surface-variant": "#46464d",
                        "primary-fixed-dim": "#c0c4e8",
                        "outline": "#77767e",
                        "on-background": "#1b1c1c",
                        "surface-variant": "#e4e2e2",
                        "on-tertiary-container": "#8c8783",
                        "surface-tint": "#585d7b",
                        "on-tertiary-fixed": "#1d1b18",
                        "background": "#fbf9f8",
                        "error-container": "#ffdad6",
                        "primary": "#030722",
                        "on-secondary-fixed": "#301408",
                        "primary-container": "#1a1f3a",

                        "surface-dim": "#dbd9d9",
                        "on-tertiary-fixed-variant": "#494643",
                        "inverse-on-surface": "#f2f0f0",
                        "surface": "#fbf9f8",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#303030",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#cbc5c1",
                        "tertiary-container": "#23201d",
                        "surface-container": "#efeded",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#7a5242",
                        "secondary-fixed": "#ffdbce",
                        "on-primary-container": "#8286a7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "margin-mobile": "20px",
                        "unit": "8px",
                        "margin-desktop": "64px",
                        "gutter": "32px"

                    "fontFamily": {
                        "display-lg-mobile": ["Playfair Display"],

                        "headline-sm": ["Playfair Display"],

                        "label-caps": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg-mobile": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "display-lg": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],

                }
            }
        }

<style>
        .fade-in-up {
            animation: fadeInUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .fade-in-delayed {
            animation: fadeIn 2s ease-in-out 1s forwards;
            opacity: 0;
        }

        .loading-line {
            width: 0;
            height: 1px;
            background-color: theme('colors.primary');
            animation: expandLine 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes expandLine {
            0% { width: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { width: 100px; opacity: 1; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-screen w-screen flex flex-col justify-center items-center overflow-hidden">
<!-- Central Content Area -->
<div class="flex flex-col items-center justify-center z-10 w-full px-margin-mobile">
<!-- Logo Text -->
<h1 class="font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg tracking-tighter text-primary fade-in-up mb-unit">
            VELVORIA
        </h1>
<!-- Subtle Divider / Loading Indicator -->
<div class="h-px w-[100px] flex justify-center mb-unit">
<div class="loading-line opacity-0"></div>
</div>
<!-- Tagline -->
<p class="font-label-caps text-label-caps text-on-surface-variant fade-in-delayed tracking-[0.2em] text-center max-w-xs mx-auto">
            The Art of Exquisite Living
        </p>
</div>
<!-- Ambient Background Texture (Subtle Grain/Noise to elevate the minimalist feel) -->
<div class="absolute inset-0 pointer-events-none opacity-5" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
<script>
        // Optional: Add a subtle parallax effect on mouse move for desktop
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 100;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 100;
            
            const title = document.querySelector('h1');
            const tagline = document.querySelector('p');
            
            if (window.innerWidth > 768) {
                title.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
                tagline.style.transform = `translate(${xAxis * 1.5}px, ${yAxis * 1.5}px)`;
            }
        });
    </script>
</body></html>
