<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom Input Styles to match luxury minimalism */
        .luxury-input {
            transition: all 300ms ease;
        }
        .luxury-input:focus {
            box-shadow: 0 0 0 3px rgba(3, 7, 34, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-text-primary min-h-screen flex flex-col font-body-lg">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim text-primary dark:text-primary-fixed shadow-[0_2px_8px_rgba(0,0,0,0.08)] bg-white dark:bg-surface-container sticky top-0 z-50">
<div class="flex justify-between items-center h-nav-height-mobile md:h-nav-height-desktop px-4 md:px-lg max-w-[1440px] mx-auto w-full">
<button aria-label="Go back" class="p-2 hover:opacity-80 transition-opacity duration-300 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm-mobile md:font-headline-sm md:text-headline-sm font-bold tracking-tight">Vendor Onboarding</h1>
<button aria-label="Close" class="p-2 hover:opacity-80 transition-opacity duration-300 scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">close</span>
</button>
</div>
</header>
<main class="flex-grow flex justify-center items-start pt-xl pb-4xl px-4 md:px-2xl w-full max-w-[1440px] mx-auto">
<div class="w-full max-w-2xl bg-white rounded-lg shadow-[0_2px_8px_rgba(0,0,0,0.08)] p-lg md:p-xl">
<!-- Progress Indicator -->
<div class="mb-lg">
<div class="flex justify-between text-body-sm text-text-secondary mb-sm font-label-md">
<span>Step 2 of 4</span>
<span>Store Details</span>
</div>
<div class="w-full bg-surface-variant rounded-full h-2">
<div class="bg-secondary h-2 rounded-full w-2/4 transition-all duration-500 ease-out"></div>
</div>
</div>
<div class="mb-xl text-center">
<h2 class="font-headline-md text-headline-md text-primary mb-sm">Store Details</h2>
<p class="font-body-md text-body-md text-text-secondary">Please provide information about your boutique or brand.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-lg" method="POST">
<div class="space-y-sm">
<label class="block font-label-lg text-label-lg text-text-primary" for="storeName">Store Name</label>
<input class="luxury-input w-full rounded-lg border border-border-subtle bg-white px-md py-sm font-body-md text-body-md text-text-primary focus:border-primary focus:ring-0 placeholder:text-text-secondary placeholder:opacity-50" id="storeName" name="storeName" placeholder="e.g. Velvoria Exclusives" required="" type="text"/>
</div>
<div class="space-y-sm">
<label class="block font-label-lg text-label-lg text-text-primary" for="legalEntity">Legal Entity Name</label>
<input class="luxury-input w-full rounded-lg border border-border-subtle bg-white px-md py-sm font-body-md text-body-md text-text-primary focus:border-primary focus:ring-0 placeholder:text-text-secondary placeholder:opacity-50" id="legalEntity" name="legalEntity" placeholder="e.g. Velvoria Retail LLC" required="" type="text"/>
</div>
<div class="space-y-sm">
<label class="block font-label-lg text-label-lg text-text-primary" for="website">Website <span class="text-text-secondary font-body-sm">(Optional)</span></label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-md text-text-secondary material-symbols-outlined text-[20px]">language</span>
<input class="luxury-input w-full rounded-lg border border-border-subtle bg-white pl-[44px] pr-md py-sm font-body-md text-body-md text-text-primary focus:border-primary focus:ring-0 placeholder:text-text-secondary placeholder:opacity-50" id="website" name="website" placeholder="https://www.yourstore.com" type="url"/>
</div>
</div>
<div class="space-y-sm">
<label class="block font-label-lg text-label-lg text-text-primary" for="country">Country of Origin</label>
<div class="relative">
<select class="luxury-input w-full appearance-none rounded-lg border border-border-subtle bg-white px-md py-sm font-body-md text-body-md text-text-primary focus:border-primary focus:ring-0" id="country" name="country" required="">
<option disabled="" selected="" value="">Select a country</option>
<option value="US">United States</option>
<option value="UK">United Kingdom</option>
<option value="FR">France</option>
<option value="IT">Italy</option>
<option value="JP">Japan</option>
</select>
<span class="absolute inset-y-0 right-0 flex items-center pr-md pointer-events-none text-text-secondary material-symbols-outlined">expand_more</span>
</div>
</div>
<div class="space-y-sm">
<label class="block font-label-lg text-label-lg text-text-primary" for="description">Store Description</label>
<textarea class="luxury-input w-full rounded-lg border border-border-subtle bg-white px-md py-sm font-body-md text-body-md text-text-primary focus:border-primary focus:ring-0 placeholder:text-text-secondary placeholder:opacity-50 resize-y" id="description" name="description" placeholder="Briefly describe your brand's ethos and primary offerings..." required="" rows="4"></textarea>
</div>
<div class="pt-xl mt-xl border-t border-surface-variant flex justify-end">
<button class="bg-primary text-white font-title-md text-title-md px-xl py-sm rounded-lg hover:shadow-[0_8px_24px_rgba(0,0,0,0.12)] transition-all duration-300 flex items-center gap-xs" type="submit">
                        Next Step
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
</body></html>
