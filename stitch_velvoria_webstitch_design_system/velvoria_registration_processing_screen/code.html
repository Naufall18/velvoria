<style>
        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(3, 7, 34, 0.1); /* Primary color at 10% */
            animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .loader-ring:nth-child(2) {
            animation-delay: -1s;
        }

        .loader-ring:nth-child(3) {
            animation-delay: -2s;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
    </style>
