<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Velvoria Checkout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">

          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "text-secondary": "#808080",
                      "surface-container-lowest": "#ffffff",
                      "surface-container": "#f3ede8",
                      "on-error": "#ffffff",
                      "success": "#10B981",
                      "surface-variant": "#e8e1dc",
                      "on-primary-fixed": "#151a34",
                      "primary-fixed-dim": "#c0c4e8",
                      "on-primary": "#ffffff",
                      "outline-variant": "#c7c5ce",
                      "on-primary-container": "#8286a7",
                      "on-background": "#1d1b18",
                      "tertiary-fixed-dim": "#9dd0cd",
                      "on-tertiary-fixed": "#00201f",
                      "on-surface": "#1d1b18",
                      "tertiary-fixed": "#b9ece9",
                      "surface-tint": "#585d7b",
                      "primary-fixed": "#dee1ff",
                      "secondary-fixed-dim": "#f0bba7",
                      "surface-container-low": "#f9f2ed",
                      "surface-container-highest": "#e8e1dc",
                      "surface-bright": "#fff8f3",
                      "surface": "#fff8f3",
                      "on-tertiary": "#ffffff",
                      "on-tertiary-fixed-variant": "#1a4e4c",
                      "background": "#fff8f3",
                      "on-secondary-fixed-variant": "#623e2f",
                      "white": "#FFFFFF",
                      "error": "#EF4444",
                      "error-container": "#ffdad6",
                      "tertiary-container": "#002625",
                      "primary": "#030722",
                      "tertiary": "#000d0c",
                      "on-secondary-container": "#7a5242",
                      "primary-container": "#1a1f3a",
                      "secondary-fixed": "#ffdbce",
                      "inverse-on-surface": "#f6efeb",
                      "on-secondary": "#ffffff",
                      "surface-container-high": "#eee7e2",
                      "surface-dim": "#dfd9d4",
                      "text-primary": "#333333",
                      "surface-light": "#F5F5F5",
                      "outline": "#77767e",
                      "secondary-container": "#ffc9b4",
                      "warning": "#F59E0B",
                      "inverse-primary": "#c0c4e8",
                      "on-surface-variant": "#46464d",
                      "secondary": "#7d5545",
                      "on-error-container": "#93000a",
                      "on-secondary-fixed": "#301408",
                      "on-primary-fixed-variant": "#404562",
                      "inverse-surface": "#33302d",
                      "border-subtle": "#E0E0E0",
                      "on-tertiary-container": "#60918f"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "xs": "4px",
                      "2xl": "48px",
                      "lg": "24px",
                      "4xl": "96px",
                      "sm": "8px",
                      "md": "16px",
                      "3xl": "64px",
                      "nav-height-mobile": "64px",
                      "base": "8px",
                      "xl": "32px",
                      "nav-height-desktop": "80px"
              },
              "fontFamily": {
                      "headline-sm": ["Playfair Display"],
                      "headline-md": ["Playfair Display"],
                      "title-sm": ["Inter"],
                      "display-lg": ["Playfair Display"],
                      "title-lg": ["Inter"],
                      "headline-lg": ["Playfair Display"],
                      "display-md": ["Playfair Display"],
                      "label-lg": ["Inter"],
                      "label-md": ["Inter"],
                      "headline-lg-mobile": ["Playfair Display"],

                      "body-sm": ["Inter"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "headline-sm": ["24px", {"lineHeight": "32px", "letterSpacing": "0px", "fontWeight": "700"}],
                      "headline-md": ["28px", {"lineHeight": "36px", "letterSpacing": "0px", "fontWeight": "700"}],
                      "title-sm": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "58px", "letterSpacing": "-0.5px", "fontWeight": "700"}],
                      "title-lg": ["22px", {"lineHeight": "28px", "letterSpacing": "0px", "fontWeight": "600"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "0px", "fontWeight": "700"}],
                      "display-md": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.5px", "fontWeight": "700"}],
                      "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "500"}],

                      "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "400"}],
                      "title-md": ["16px", {"lineHeight": "24px", "letterSpacing": "0.15px", "fontWeight": "600"}],
                      "body-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.4px", "fontWeight": "400"}],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased">
<!-- Transactional Header -->
<header class="fixed top-0 w-full z-50 bg-surface h-nav-height-mobile flex items-center px-md">
<button aria-label="Go back" class="text-primary p-sm -ml-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="flex-1 text-center font-headline-sm text-headline-sm text-primary pr-xl">Checkout</h1>
</header>
<main class="pt-nav-height-mobile pb-3xl px-md max-w-lg mx-auto">
<!-- Stepper -->
<div class="py-lg mb-md">
<div class="flex items-center justify-between relative">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-[2px] bg-outline-variant -z-10"></div>
<!-- Completed Step -->
<div class="flex flex-col items-center gap-sm bg-surface">
<div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center border-2 border-primary">
<span class="material-symbols-outlined text-[16px]">check</span>
</div>
<span class="font-label-md text-label-md text-primary hidden md:block">Cart</span>
</div>
<!-- Active Step -->
<div class="flex flex-col items-center gap-sm bg-surface px-xs">
<div class="w-8 h-8 rounded-full bg-secondary-fixed-dim text-on-secondary-fixed flex items-center justify-center border-2 border-surface shadow-sm">
<span class="font-title-sm text-title-sm">2</span>
</div>
<span class="font-label-md text-label-md text-primary font-bold hidden md:block">Shipping</span>
</div>
<!-- Upcoming Steps -->
<div class="flex flex-col items-center gap-sm bg-surface">
<div class="w-8 h-8 rounded-full bg-surface-variant text-outline flex items-center justify-center border-2 border-surface">
<span class="font-title-sm text-title-sm">3</span>
</div>
</div>
<div class="flex flex-col items-center gap-sm bg-surface">
<div class="w-8 h-8 rounded-full bg-surface-variant text-outline flex items-center justify-center border-2 border-surface">
<span class="font-title-sm text-title-sm">4</span>
</div>
</div>
</div>
<div class="text-center mt-md md:hidden">
<span class="font-label-lg text-label-lg text-primary font-bold">Shipping</span>
</div>
</div>
<!-- Forms Container -->
<div class="space-y-xl">
<!-- Shipping Information -->
<section>
<h2 class="font-title-lg text-title-lg text-primary mb-lg">Shipping Information</h2>
<div class="space-y-md">
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="fullName">Full Name</label>
<input class="w-full bg-white border border-border-subtle rounded-lg px-md py-sm font-body-md text-body-md text-primary focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="fullName" placeholder="Jane Doe" type="text"/>
</div>
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="address">Address</label>
<input class="w-full bg-white border border-border-subtle rounded-lg px-md py-sm font-body-md text-body-md text-primary focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="address" placeholder="123 Luxury Lane" type="text"/>
</div>
<div class="flex gap-md">
<div class="flex-1">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="city">City</label>
<input class="w-full bg-white border border-border-subtle rounded-lg px-md py-sm font-body-md text-body-md text-primary focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="city" placeholder="New York" type="text"/>
</div>
<div class="w-1/3">
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="postal">Postal Code</label>
<input class="w-full bg-white border border-border-subtle rounded-lg px-md py-sm font-body-md text-body-md text-primary focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="postal" placeholder="10001" type="text"/>
</div>
</div>
<div>
<label class="block font-label-lg text-label-lg text-on-surface-variant mb-xs" for="country">Country</label>
<div class="relative">
<select class="w-full bg-white border border-border-subtle rounded-lg px-md py-sm font-body-md text-body-md text-primary appearance-none focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="country">
<option>United States</option>
<option>United Kingdom</option>
<option>France</option>
<option>Italy</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-md text-outline">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</div>
</section>
<!-- Shipping Method -->
<section>
<h2 class="font-title-lg text-title-lg text-primary mb-lg">Shipping Method</h2>
<div class="space-y-sm">
<label class="flex items-center justify-between p-md bg-white border border-primary rounded-lg cursor-pointer shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
<div class="flex items-center gap-md">
<input checked="" class="w-4 h-4 text-primary border-outline focus:ring-primary" name="shipping" type="radio" value="standard"/>
<div>
<span class="block font-title-sm text-title-sm text-primary">Standard</span>
<span class="block font-body-sm text-body-sm text-on-surface-variant mt-xs">5-7 business days</span>
</div>
</div>
<span class="font-title-sm text-title-sm text-primary">$20.00</span>
</label>
<label class="flex items-center justify-between p-md bg-white border border-border-subtle rounded-lg cursor-pointer opacity-80 hover:opacity-100 transition-opacity">
<div class="flex items-center gap-md">
<input class="w-4 h-4 text-primary border-outline focus:ring-primary" name="shipping" type="radio" value="express"/>
<div>
<span class="block font-title-sm text-title-sm text-primary">Express</span>
<span class="block font-body-sm text-body-sm text-on-surface-variant mt-xs">2-3 business days</span>
</div>
</div>
<span class="font-title-sm text-title-sm text-primary">$50.00</span>
</label>
</div>
</section>
<!-- Order Summary -->
<section class="bg-surface-container-low rounded-lg p-md">
<div class="space-y-sm mb-md border-b border-outline-variant pb-md">
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Subtotal</span>
<span>$1,450.00</span>
</div>
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Shipping</span>
<span>$20.00</span>
</div>
</div>
<div class="flex justify-between font-title-lg text-title-lg text-primary">
<span>Total</span>
<span>$1,470.00</span>
</div>
</section>
</div>
</main>
<!-- Fixed Bottom CTA Area -->
<div class="fixed bottom-0 w-full bg-surface border-t border-border-subtle p-md pb-6 md:pb-md z-50">
<div class="max-w-lg mx-auto">
<button class="w-full bg-secondary-fixed-dim text-on-secondary-fixed py-lg rounded-lg font-title-sm text-title-sm uppercase tracking-wide flex justify-center items-center gap-sm active:scale-95 transition-transform shadow-md">
                Continue to Payment
            </button>
<div class="flex items-center justify-center gap-xs mt-sm text-on-surface-variant opacity-80">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span class="font-body-sm text-body-sm">Secure Checkout</span>
</div>
</div>
</div>
</body></html>
