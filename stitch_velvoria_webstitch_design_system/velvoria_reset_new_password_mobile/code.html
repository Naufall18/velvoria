<body class="bg-surface font-body-lg text-text-primary min-h-screen flex flex-col relative antialiased overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface shadow-sm shadow-[0_2px_8px_rgba(0,0,0,0.08)]">
<div class="flex justify-between items-center px-4 h-nav-height-mobile md:h-nav-height-desktop max-w-[1440px] mx-auto">
<button aria-label="Go back" class="p-2 text-on-surface-variant hover:opacity-80 transition-opacity duration-300 active:scale-95 transition-transform flex items-center justify-center rounded-full focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-opacity-20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md-mobile md:text-headline-md text-primary tracking-tight absolute left-1/2 -translate-x-1/2">
                Velvoria
            </div>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 pt-nav-height-mobile md:pt-nav-height-desktop pb-2xl">
<div class="w-full max-w-md">
<!-- Centered Card -->
<div class="bg-white rounded-lg shadow-[0_2px_8px_rgba(0,0,0,0.08)] p-xl md:p-2xl flex flex-col items-center">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary text-center mb-base">Create New Password</h1>
<p class="font-body-md text-body-md text-text-secondary text-center mb-xl max-w-[280px]">Your new password must be different from previous passwords.</p>
<!-- Form -->
<form class="w-full space-y-md" onsubmit="event.preventDefault();">
<!-- Password Field -->
<div class="space-y-xs relative group">
<label class="font-label-lg text-label-lg text-text-primary block" for="new_password">New Password</label>
<div class="relative">
<input class="w-full bg-white border border-border-subtle rounded-lg px-md py-sm font-body-md text-body-md text-text-primary focus:outline-none focus:border-primary focus:ring-0 transition-colors placeholder:text-text-secondary" id="new_password" placeholder="Enter new password" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-xs relative group">
<label class="font-label-lg text-label-lg text-text-primary block" for="confirm_password">Confirm New Password</label>
<div class="relative">
<input class="w-full bg-white border border-border-subtle rounded-lg px-md py-sm font-body-md text-body-md text-text-primary focus:outline-none focus:border-primary focus:ring-0 transition-colors placeholder:text-text-secondary" id="confirm_password" placeholder="Confirm new password" type="password"/>
<button aria-label="Toggle confirm password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant opacity-60 hover:opacity-100 transition-opacity focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">visibility_off</span>
</button>
</div>
</div>
<!-- Requirements -->
<div class="pt-sm pb-base">
<p class="font-label-md text-label-md text-text-secondary mb-2">Password must contain at least:</p>
<ul class="space-y-1 font-body-sm text-body-sm text-text-secondary">
<li class="flex items-center space-x-2">
<span class="material-symbols-outlined text-[14px] text-outline-variant" style="font-variation-settings: 'FILL' 0;">check_circle</span>
<span>8 characters</span>
</li>
<li class="flex items-center space-x-2">
<span class="material-symbols-outlined text-[14px] text-outline-variant" style="font-variation-settings: 'FILL' 0;">check_circle</span>
<span>1 number</span>
</li>
<li class="flex items-center space-x-2">
<span class="material-symbols-outlined text-[14px] text-outline-variant" style="font-variation-settings: 'FILL' 0;">check_circle</span>
<span>1 special character (!@#$%^&amp;*)</span>
</li>
</ul>
</div>
<!-- Submit Button -->
<button class="w-full bg-secondary-container text-on-secondary-fixed font-title-md text-title-md py-3 rounded-lg hover:shadow-[0_8px_24px_rgba(0,0,0,0.12)] transition-shadow duration-300 mt-lg active:scale-95" type="submit">
                        Reset Password
                    </button>
</form>
</div>
</div>
</main>
<!-- Decorative ambient glow behind card for subtle depth -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[60vw] max-w-[600px] max-h-[600px] bg-secondary-fixed opacity-[0.03] rounded-full blur-[100px] pointer-events-none -z-10"></div>
<script>
        // Simple password toggle logic for prototype feel
        const toggleButtons = document.querySelectorAll('button[aria-label^="Toggle"]');
        toggleButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const icon = this.querySelector('.material-symbols-outlined');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility_off';
                }
            });
        });

        // Basic requirement checking logic (visual only for prototype)
        const newPasswordInput = document.getElementById('new_password');
        const requirementsIcons = document.querySelectorAll('.space-y-1 .material-symbols-outlined');

        newPasswordInput.addEventListener('input', function(e) {
            const val = e.target.value;
            
            // Length
            if(val.length >= 8) {
                requirementsIcons[0].classList.replace('text-outline-variant', 'text-success');
                requirementsIcons[0].style.fontVariationSettings = "'FILL' 1";
            } else {
                requirementsIcons[0].classList.replace('text-success', 'text-outline-variant');
                requirementsIcons[0].style.fontVariationSettings = "'FILL' 0";
            }

            // Number
            if(/\d/.test(val)) {
                requirementsIcons[1].classList.replace('text-outline-variant', 'text-success');
                requirementsIcons[1].style.fontVariationSettings = "'FILL' 1";
            } else {
                requirementsIcons[1].classList.replace('text-success', 'text-outline-variant');
                requirementsIcons[1].style.fontVariationSettings = "'FILL' 0";
            }

            // Special Char
            if(/[!@#$%^&*(),.?":{}|<>]/.test(val)) {
                requirementsIcons[2].classList.replace('text-outline-variant', 'text-success');
                requirementsIcons[2].style.fontVariationSettings = "'FILL' 1";
            } else {
                requirementsIcons[2].classList.replace('text-success', 'text-outline-variant');
                requirementsIcons[2].style.fontVariationSettings = "'FILL' 0";
            }
        });
    </script>
</body></html>
