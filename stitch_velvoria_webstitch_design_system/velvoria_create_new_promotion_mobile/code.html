<body class="bg-surface text-text-primary font-body-md min-h-screen pt-nav-height-mobile md:pt-nav-height-desktop pb-nav-height-mobile md:pb-xl flex flex-col items-center">
<!-- Top Navigation (Suppressed Bottom Nav for Transactional Flow) -->
<header class="fixed top-0 w-full z-50 bg-white dark:bg-surface-container shadow-sm dark:shadow-none flex justify-between items-center h-nav-height-mobile md:h-nav-height-desktop px-md md:px-2xl w-full">
<div class="flex items-center gap-md">
<button aria-label="Go Back" class="hover:opacity-80 transition-opacity active:scale-95 transition-transform flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm md:font-headline-md md:text-headline-md text-primary dark:text-inverse-primary tracking-tight">Create New Promotion</h1>
</div>
</header>
<main class="w-full max-w-[800px] px-md md:px-0 mt-xl">
<form class="space-y-xl">
<!-- Section 1: Basic Information -->
<section class="bg-white rounded-xl luxury-card-shadow p-xl space-y-lg border-l-4 border-transparent hover:border-secondary transition-all duration-300">
<h2 class="font-title-lg text-title-lg text-primary border-b border-border-subtle pb-sm">Basic Information</h2>
<div class="space-y-md">
<div>
<label class="block font-label-lg text-label-lg text-text-primary mb-sm" for="promoName">Promotion Name</label>
<div class="input-focus-ring rounded-lg bg-white border border-border-subtle overflow-hidden transition-all duration-300">
<input class="w-full px-md py-sm border-none focus:ring-0 font-body-lg text-body-lg text-primary placeholder-text-secondary bg-transparent outline-none" id="promoName" placeholder="e.g., Summer Sale 2024" type="text"/>
</div>
</div>
<div>
<label class="block font-label-lg text-label-lg text-text-primary mb-sm" for="promoCode">Promo Code</label>
<div class="flex flex-col sm:flex-row gap-md">
<div class="input-focus-ring rounded-lg bg-white border border-border-subtle overflow-hidden transition-all duration-300 flex-grow">
<input class="w-full px-md py-sm border-none focus:ring-0 font-body-lg text-body-lg text-primary placeholder-text-secondary bg-transparent outline-none uppercase uppercase" id="promoCode" placeholder="Enter code" type="text"/>
</div>
<button class="whitespace-nowrap px-lg py-sm rounded-lg border-2 border-primary text-primary font-title-sm text-title-sm hover:bg-surface-light transition-colors duration-300 active:scale-95" type="button">
                                Generate Random
                            </button>
</div>
</div>
</div>
</section>
<!-- Section 2: Discount Details -->
<section class="bg-white rounded-xl luxury-card-shadow p-xl space-y-lg border-l-4 border-transparent hover:border-secondary transition-all duration-300">
<h2 class="font-title-lg text-title-lg text-primary border-b border-border-subtle pb-sm">Discount Details</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div>
<label class="block font-label-lg text-label-lg text-text-primary mb-sm" for="discountType">Discount Type</label>
<div class="input-focus-ring rounded-lg bg-white border border-border-subtle overflow-hidden transition-all duration-300 relative">
<select class="w-full px-md py-sm border-none focus:ring-0 font-body-lg text-body-lg text-primary bg-transparent outline-none appearance-none pr-xl" id="discountType">
<option value="percentage">Percentage</option>
<option value="fixed">Fixed Amount</option>
<option value="bogo">Buy X Get Y</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-text-secondary pointer-events-none">expand_more</span>
</div>
</div>
<div>
<label class="block font-label-lg text-label-lg text-text-primary mb-sm" for="discountValue">Discount Value</label>
<div class="input-focus-ring rounded-lg bg-white border border-border-subtle overflow-hidden transition-all duration-300 flex items-center pr-md">
<input class="w-full px-md py-sm border-none focus:ring-0 font-body-lg text-body-lg text-primary placeholder-text-secondary bg-transparent outline-none" id="discountValue" placeholder="e.g., 20" type="number"/>
<span class="font-body-lg text-text-secondary" id="valueSuffix">%</span>
</div>
</div>
<div class="md:col-span-2">
<label class="block font-label-lg text-label-lg text-text-primary mb-sm" for="minSpend">Minimum Spend (Optional)</label>
<div class="input-focus-ring rounded-lg bg-white border border-border-subtle overflow-hidden transition-all duration-300 flex items-center pl-md">
<span class="font-body-lg text-text-secondary">$</span>
<input class="w-full px-sm py-sm border-none focus:ring-0 font-body-lg text-body-lg text-primary placeholder-text-secondary bg-transparent outline-none" id="minSpend" placeholder="0.00" type="number"/>
</div>
</div>
</div>
</section>
<!-- Section 3: Duration -->
<section class="bg-white rounded-xl luxury-card-shadow p-xl space-y-lg border-l-4 border-transparent hover:border-secondary transition-all duration-300">
<h2 class="font-title-lg text-title-lg text-primary border-b border-border-subtle pb-sm">Duration</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div>
<label class="block font-label-lg text-label-lg text-text-primary mb-sm" for="startDate">Start Date</label>
<div class="input-focus-ring rounded-lg bg-white border border-border-subtle overflow-hidden transition-all duration-300 flex items-center pr-md">
<input class="w-full px-md py-sm border-none focus:ring-0 font-body-lg text-body-lg text-primary placeholder-text-secondary bg-transparent outline-none" id="startDate" type="date"/>
</div>
</div>
<div>
<label class="block font-label-lg text-label-lg text-text-primary mb-sm" for="endDate">End Date</label>
<div class="input-focus-ring rounded-lg bg-white border border-border-subtle overflow-hidden transition-all duration-300 flex items-center pr-md">
<input class="w-full px-md py-sm border-none focus:ring-0 font-body-lg text-body-lg text-primary placeholder-text-secondary bg-transparent outline-none" id="endDate" type="date"/>
</div>
</div>
</div>
</section>
<!-- Section 4: Applicability -->
<section class="bg-white rounded-xl luxury-card-shadow p-xl space-y-lg border-l-4 border-transparent hover:border-secondary transition-all duration-300">
<h2 class="font-title-lg text-title-lg text-primary border-b border-border-subtle pb-sm">Applicability</h2>
<div class="space-y-md">
<label class="flex items-start gap-md cursor-pointer group">
<div class="relative flex items-center justify-center w-5 h-5 mt-0.5">
<input checked="" class="peer appearance-none w-5 h-5 border border-outline rounded-full checked:border-primary checked:border-[6px] transition-all duration-200" name="applicability" type="radio" value="all"/>
</div>
<div class="flex flex-col">
<span class="font-title-sm text-title-sm text-primary group-hover:text-secondary transition-colors">Apply to All Products</span>
<span class="font-body-sm text-body-sm text-text-secondary">Discount applies to entire store inventory.</span>
</div>
</label>
<label class="flex items-start gap-md cursor-pointer group">
<div class="relative flex items-center justify-center w-5 h-5 mt-0.5">
<input class="peer appearance-none w-5 h-5 border border-outline rounded-full checked:border-primary checked:border-[6px] transition-all duration-200" name="applicability" type="radio" value="specific"/>
</div>
<div class="flex flex-col">
<span class="font-title-sm text-title-sm text-primary group-hover:text-secondary transition-colors">Select Specific Categories/Products</span>
<span class="font-body-sm text-body-sm text-text-secondary">Choose exactly which items are eligible.</span>
</div>
</label>
</div>
</section>
<!-- Footer Actions -->
<div class="flex flex-col sm:flex-row justify-end gap-md pt-lg">
<button class="px-xl py-md rounded-lg bg-transparent border-2 border-primary text-primary font-title-md text-title-md hover:bg-surface-light transition-colors duration-300 active:scale-95 text-center" type="button">
                    Cancel
                </button>
<button class="px-xl py-md rounded-lg bg-[#E8B4A0] text-white font-title-md text-title-md hover:opacity-90 hover:shadow-[0_8px_24px_rgba(0,0,0,0.12)] transition-all duration-300 active:scale-95 text-center" type="submit">
                    Create Promotion
                </button>
</div>
</form>
</main>
<script>
        // Simple logic to toggle suffix based on discount type selection
        document.getElementById('discountType').addEventListener('change', function(e) {
            const suffixEl = document.getElementById('valueSuffix');
            if(e.target.value === 'percentage') {
                suffixEl.textContent = '%';
            } else if (e.target.value === 'fixed') {
                suffixEl.textContent = '$';
            } else {
                suffixEl.textContent = ''; // For BOGO
            }
        });
    </script>
</body></html>
