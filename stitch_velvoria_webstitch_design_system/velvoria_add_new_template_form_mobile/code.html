<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Velvoria - Add New Template</title>

                    "background": "#fff8f3",

                    "inverse-primary": "#c0c4e8",
                    "on-secondary-container": "#7a5242",

                    "error-container": "#ffdad6",

                    "on-error-container": "#93000a",
                    "on-tertiary": "#ffffff",
                    "secondary-container": "#ffc9b4",
                    "on-error": "#ffffff",
                    "success": "#10B981",
                    "tertiary-fixed": "#b9ece9",
                    "on-primary-container": "#8286a7",
                    "inverse-on-surface": "#f6efeb",
                    "error": "#EF4444",
                    "on-surface-variant": "#46464d",
                    "primary-container": "#1a1f3a",
                    "primary-fixed": "#dee1ff",
                    "text-primary": "#333333",
                    "secondary-fixed-dim": "#f0bba7",
                    "on-tertiary-fixed-variant": "#1a4e4c",
                    "on-surface": "#1d1b18",
                    "text-secondary": "#808080",
                    "outline-variant": "#c7c5ce",
                    "surface-dim": "#dfd9d4",

            "borderRadius": {

<style>
        body {
            background-color: #fff8f3; /* surface */
            color: #1d1b18; /* on-surface */
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Custom focus rings for Velvoria */
        .v-focus-ring:focus-within {
            outline: none;
            border-color: #1a1f3a; /* Deep Navy */
            box-shadow: 0 0 0 3px rgba(26, 31, 58, 0.1);
        }
        
        .v-focus-ring-secondary:focus-within {
             outline: none;
             border-color: #ffc9b4; /* Rose Gold / secondary-container proxy */
             box-shadow: 0 0 0 3px rgba(255, 201, 180, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased flex flex-col min-h-screen relative">
<!-- TopAppBar -->
<header class="w-full top-0 shadow-sm bg-surface-container-lowest flex justify-between items-center px-md h-nav-height-mobile sticky z-40 hidden md:flex">
<div class="flex items-center gap-md">
<button aria-label="Close" class="p-2 rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-primary">close</span>
</button>
</div>
<div class="font-headline-sm text-headline-sm font-bold text-primary dark:text-primary-fixed truncate flex-1 text-center pr-[40px]">
            New Template
        </div>
<!-- Placeholder for trailing icon if needed, omitted here to match intent -->
</header>
<!-- Mobile TopAppBar -->
<header class="w-full top-0 shadow-sm bg-surface-container-lowest flex justify-between items-center px-md h-nav-height-mobile sticky z-40 md:hidden">
<button aria-label="Close" class="p-2 -ml-2 rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-primary">close</span>
</button>
<div class="font-headline-sm text-headline-sm font-bold text-primary truncate">
            New Template
        </div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-3xl mx-auto px-md md:px-lg py-xl flex flex-col gap-lg">
<div class="mb-sm md:mb-lg hidden md:block">
<h1 class="font-display-md text-display-md text-primary tracking-tight">New Template</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm">Create a reusable message snippet to streamline your vendor communications.</p>
</div>
<form class="bg-surface-container-lowest p-lg md:p-xl rounded-lg shadow-sm flex flex-col gap-xl">
<!-- Section 1: Basic Info -->
<fieldset class="flex flex-col gap-lg">
<legend class="sr-only">Template Details</legend>
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-text-primary" for="templateName">Template Name</label>
<div class="relative v-focus-ring rounded-lg bg-white border border-border-subtle overflow-hidden transition-shadow duration-200">
<input class="w-full bg-transparent border-none py-sm px-md font-body-md text-body-md text-on-surface focus:ring-0 placeholder:text-text-secondary h-12" id="templateName" name="templateName" placeholder="e.g., Shipping Policy" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-text-primary" for="category">Category</label>
<div class="relative v-focus-ring rounded-lg bg-white border border-border-subtle overflow-hidden transition-shadow duration-200">
<select class="w-full bg-transparent border-none py-sm px-md pr-10 font-body-md text-body-md text-on-surface focus:ring-0 appearance-none h-12 cursor-pointer" id="category" name="category">
<option disabled="" hidden="" selected="" value="">Select a category</option>
<option value="shipping">Shipping</option>
<option value="product_info">Product Info</option>
<option value="policies">Policies</option>
<option value="greetings">Greetings</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-md text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-text-primary" for="shortcut">Shortcut Command</label>
<p class="font-body-sm text-body-sm text-text-secondary mb-1">Type this command in the chat to quickly insert the template.</p>
<div class="relative v-focus-ring rounded-lg bg-white border border-border-subtle overflow-hidden transition-shadow duration-200 flex items-center">
<span class="pl-md text-secondary-container select-none font-body-md text-body-md">/</span>
<input class="w-full bg-transparent border-none py-sm pl-1 pr-md font-body-md text-body-md text-on-surface focus:ring-0 placeholder:text-text-secondary h-12" id="shortcut" name="shortcut" placeholder="shipping" type="text"/>
</div>
</div>
</fieldset>
<hr class="border-border-subtle"/>
<!-- Section 2: Content -->
<fieldset class="flex flex-col gap-xs">
<div class="flex justify-between items-end mb-1">
<label class="font-label-lg text-label-lg text-text-primary" for="messageContent">Message Content</label>
<button class="text-secondary hover:text-on-secondary-container transition-colors font-label-sm flex items-center gap-1 group" type="button">
<span class="material-symbols-outlined text-[16px] group-hover:scale-110 transition-transform">add_circle</span>
                        Insert Variable
                    </button>
</div>
<div class="relative v-focus-ring rounded-lg bg-white border border-border-subtle overflow-hidden transition-shadow duration-200">
<textarea class="w-full bg-transparent border-none py-md px-md font-body-md text-body-md text-on-surface focus:ring-0 placeholder:text-text-secondary resize-y min-h-[120px]" id="messageContent" name="messageContent" placeholder="Write your template message here..." rows="6"></textarea>
</div>
</fieldset>
<!-- Actions -->
<div class="flex flex-col sm:flex-row gap-md justify-end mt-sm pt-md border-t border-border-subtle">
<button class="px-lg py-sm rounded-lg font-label-lg text-label-lg border-2 border-primary text-primary hover:bg-surface-container-low transition-colors duration-300 w-full sm:w-auto text-center" type="button">
                    Cancel
                </button>
<button class="px-lg py-sm rounded-lg font-label-lg text-label-lg bg-primary text-white hover:bg-primary-container shadow-sm hover:shadow-md transition-all duration-300 w-full sm:w-auto text-center flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-[18px]">save</span>
                    Save Template
                </button>
</div>
</form>
</main>
</body></html>
