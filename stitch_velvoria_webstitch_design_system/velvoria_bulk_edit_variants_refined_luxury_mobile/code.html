<style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
        .material-symbols-outlined[style*="'FILL' 1"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface antialiased min-h-screen relative overflow-hidden flex items-end md:items-center justify-center">
<!-- Backdrop overlay -->
<div class="absolute inset-0 bg-primary/20 backdrop-blur-sm z-40 transition-opacity duration-300"></div>
<!-- Modal Container -->
<div class="relative z-50 w-full max-w-md bg-white rounded-t-3xl md:rounded-3xl shadow-[0_16px_40px_rgba(0,0,0,0.16)] flex flex-col max-h-[795px] transition-transform duration-300 translate-y-0">
<!-- Drag Handle (Mobile) -->
<div class="w-full flex justify-center pt-md pb-sm md:hidden">
<div class="w-12 h-1.5 bg-border-subtle rounded-full"></div>
</div>
<!-- Header -->
<div class="px-lg pt-sm md:pt-lg pb-md border-b border-surface-container flex justify-between items-start">
<div>
<h2 class="font-headline-sm text-headline-sm text-primary tracking-tight">Bulk Edit</h2>
<p class="font-body-md text-body-md text-text-secondary mt-xs">12 variants selected</p>
</div>
<button class="text-on-surface-variant hover:text-primary transition-colors p-sm -mr-sm -mt-sm rounded-full hover:bg-surface-container">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
</div>
<!-- Scrollable Content Area -->
<div class="overflow-y-auto px-lg py-lg space-y-xl flex-grow scrollbar-hide">
<!-- Update Price Field -->
<div class="space-y-sm">
<label class="block font-label-lg text-label-lg text-text-primary" for="bulk-price">Update Price</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 font-body-lg text-body-lg text-text-secondary">$</span>
<input class="w-full pl-[32px] pr-md py-md bg-white border border-border-subtle rounded-lg font-body-lg text-body-lg text-primary placeholder:text-text-secondary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:shadow-[0_4px_12px_rgba(3,7,34,0.08)] transition-all" id="bulk-price" placeholder="Leave blank to keep current" type="number"/>
</div>
<p class="font-body-sm text-body-sm text-text-secondary">Applies a flat price to all selected items.</p>
</div>
<!-- Update Stock Field -->
<div class="space-y-sm">
<label class="block font-label-lg text-label-lg text-text-primary" for="bulk-stock">Update Stock Quantity</label>
<div class="relative">
<input class="w-full px-md py-md bg-white border border-border-subtle rounded-lg font-body-lg text-body-lg text-primary placeholder:text-text-secondary focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:shadow-[0_4px_12px_rgba(3,7,34,0.08)] transition-all" id="bulk-stock" placeholder="0" type="number"/>
</div>
<div class="flex items-center gap-sm mt-sm">
<input class="w-4 h-4 text-primary border-border-subtle rounded focus:ring-primary cursor-pointer" id="add-to-existing" type="checkbox"/>
<label class="font-body-md text-body-md text-text-primary cursor-pointer" for="add-to-existing">Add to existing stock instead of replacing</label>
</div>
</div>
<!-- Set Availability Toggle -->
<div class="space-y-md">
<label class="block font-label-lg text-label-lg text-text-primary">Set Availability</label>
<div class="grid grid-cols-2 gap-md">
<!-- Active Option -->
<label class="relative flex items-center justify-center p-md border border-border-subtle rounded-lg cursor-pointer hover:bg-surface-container transition-colors has-[:checked]:border-primary has-[:checked]:bg-surface group">
<input class="sr-only" name="availability" type="radio" value="active"/>
<div class="flex flex-col items-center gap-xs">
<span class="material-symbols-outlined text-success group-has-[:checked]:text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-title-sm text-title-sm text-primary">Active</span>
</div>
</label>
<!-- Inactive Option -->
<label class="relative flex items-center justify-center p-md border border-border-subtle rounded-lg cursor-pointer hover:bg-surface-container transition-colors has-[:checked]:border-primary has-[:checked]:bg-surface group">
<input class="sr-only" name="availability" type="radio" value="inactive"/>
<div class="flex flex-col items-center gap-xs">
<span class="material-symbols-outlined text-text-secondary group-has-[:checked]:text-primary">visibility_off</span>
<span class="font-title-sm text-title-sm text-primary">Inactive</span>
</div>
</label>
</div>
<p class="font-body-sm text-body-sm text-text-secondary text-center pt-xs">Selecting an option overrides current status.</p>
</div>
</div>
<!-- Footer Actions -->
<div class="p-lg border-t border-surface-container bg-white rounded-b-3xl flex flex-col-reverse md:flex-row gap-md">
<button class="w-full md:w-1/2 px-lg py-md border-2 border-primary bg-transparent text-primary font-title-md text-title-md rounded-lg hover:bg-surface-container transition-all active:scale-95 duration-200 flex justify-center items-center">
                Cancel
            </button>
<button class="w-full md:w-1/2 px-lg py-md bg-primary text-white font-title-md text-title-md rounded-lg shadow-sm hover:shadow-[0_8px_24px_rgba(0,0,0,0.12)] hover:bg-primary-container transition-all active:scale-95 duration-200 flex justify-center items-center">
                Apply Changes
            </button>
</div>
</div>
</body></html>
