<div class="absolute inset-0 rounded-full bg-accent-gold opacity-0 group-hover:opacity-10 transition-opacity duration-500"></div>
<span class="material-symbols-outlined text-primary text-[36px]" data-icon="shield_lock" style="font-variation-settings: 'FILL' 0;">shield_lock</span>

<p class="font-body-md text-body-md text-text-secondary text-center mb-2xl max-w-[300px]">
                We've sent a 4-digit code to your email address <span class="text-primary font-medium">eleanor.vance@example.com</span>. Please enter it below to continue.
            </p>
<!-- OTP Input Form -->
<form class="w-full flex flex-col items-center" id="otp-form">
<div class="flex gap-4 justify-center mb-xl w-full" id="otp-container">
<input aria-label="Digit 1" class="w-16 h-16 text-center font-display-md text-headline-lg bg-white border border-border-subtle rounded-lg focus:outline-none focus:border-primary focus:ring-0 focus:shadow-[0_0_0_3px_rgba(3,7,34,0.1)] transition-all duration-300 shadow-sm hover:shadow-md" inputmode="numeric" maxlength="1" pattern="[0-9]" placeholder="-" type="text"/>
<input aria-label="Digit 2" class="w-16 h-16 text-center font-display-md text-headline-lg bg-white border border-border-subtle rounded-lg focus:outline-none focus:border-primary focus:ring-0 focus:shadow-[0_0_0_3px_rgba(3,7,34,0.1)] transition-all duration-300 shadow-sm hover:shadow-md" disabled="" inputmode="numeric" maxlength="1" pattern="[0-9]" placeholder="-" type="text"/>
<input aria-label="Digit 3" class="w-16 h-16 text-center font-display-md text-headline-lg bg-white border border-border-subtle rounded-lg focus:outline-none focus:border-primary focus:ring-0 focus:shadow-[0_0_0_3px_rgba(3,7,34,0.1)] transition-all duration-300 shadow-sm hover:shadow-md" disabled="" inputmode="numeric" maxlength="1" pattern="[0-9]" placeholder="-" type="text"/>
<input aria-label="Digit 4" class="w-16 h-16 text-center font-display-md text-headline-lg bg-white border border-border-subtle rounded-lg focus:outline-none focus:border-primary focus:ring-0 focus:shadow-[0_0_0_3px_rgba(3,7,34,0.1)] transition-all duration-300 shadow-sm hover:shadow-md" disabled="" inputmode="numeric" maxlength="1" pattern="[0-9]" placeholder="-" type="text"/>
</div>
<!-- Timer/Resend -->
<div class="font-body-md text-body-md text-text-secondary text-center mb-2xl flex items-center justify-center gap-1">
                    Didn't receive the code? 
                    <button class="text-primary font-title-sm font-semibold hover:opacity-80 transition-opacity focus:outline-none" disabled="" id="resend-btn" type="button">
                        Resend in <span class="tabular-nums" id="timer">00:58</span>
</button>
</div>
<!-- CTA Button -->
<button class="w-full py-4 px-6 bg-accent-gold text-white font-title-md text-title-md rounded-lg shadow-md hover:shadow-[0_8px_24px_rgba(0,0,0,0.12)] hover:opacity-90 active:scale-[0.98] transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-accent-gold focus:ring-offset-2 focus:ring-offset-surface disabled:opacity-50 disabled:cursor-not-allowed" disabled="" id="verify-btn" type="submit">
                    Verify &amp; Proceed
                </button>

<style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('#otp-container input');
            const verifyBtn = document.getElementById('verify-btn');
            const timerSpan = document.getElementById('timer');
            const resendBtn = document.getElementById('resend-btn');
            
            // Timer logic
            let timeLeft = 58;
            const timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    timerSpan.textContent = '';
                    resendBtn.textContent = 'Resend Now';
                    resendBtn.disabled = false;
                    resendBtn.classList.remove('opacity-50');
                } else {
                    timerSpan.textContent = `00:${timeLeft.toString().padStart(2, '0')}`;
                }
            }, 1000);

            // OTP Input logic
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    const value = e.target.value;
                    
                    // Allow only numbers
                    if (!/^\d$/.test(value)) {
                        e.target.value = '';
                        return;
                    }

                    // Move to next input
                    if (value !== '' && index < inputs.length - 1) {
                        inputs[index + 1].disabled = false;
                        inputs[index + 1].focus();
                    }

                    checkIfComplete();
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace') {
                        if (input.value === '' && index > 0) {
                            inputs[index - 1].focus();
                            inputs[index - 1].value = '';
                        }
                        checkIfComplete();
                    }
                });

                // Paste event for OTP
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pastedData = e.clipboardData.getData('text/plain').slice(0, 4);
                    
                    if (/^\d+$/.test(pastedData)) {
                        const digits = pastedData.split('');
                        digits.forEach((digit, i) => {
                            if (i < inputs.length) {
                                inputs[i].value = digit;
                                inputs[i].disabled = false;
                            }
                        });
                        
                        // Focus the next empty input or the last one
                        const nextIndex = Math.min(digits.length, inputs.length - 1);
                        inputs[nextIndex].focus();
                        checkIfComplete();
                    }
                });
            });

            function checkIfComplete() {
                const isComplete = Array.from(inputs).every(input => input.value !== '');
                verifyBtn.disabled = !isComplete;
                if(isComplete) {
                    verifyBtn.classList.add('shadow-[0_8px_24px_rgba(232,180,160,0.3)]');
                } else {
                    verifyBtn.classList.remove('shadow-[0_8px_24px_rgba(232,180,160,0.3)]');
                }
            }

            // Initially focus first input
            inputs[0].focus();
        });
    </script>
