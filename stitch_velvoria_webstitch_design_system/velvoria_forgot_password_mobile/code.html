<body class="bg-surface text-on-surface min-h-screen flex flex-col font-sans antialiased selection:bg-secondary-fixed-dim selection:text-on-surface">
<!-- Top Navigation (Transactional Layout - Reduced Shell) -->
<header class="w-full top-0 bg-surface flex items-center justify-between px-md h-nav-height-mobile shadow-sm relative z-10 md:hidden">
<button aria-label="Go back to login" class="text-primary hover:opacity-80 transition-opacity scale-95 duration-200 flex items-center justify-center p-2">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary absolute left-1/2 -translate-x-1/2">Velvoria</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Desktop Header -->
<header class="hidden md:flex w-full top-0 bg-surface items-center justify-center h-nav-height-desktop shadow-sm relative z-10">
<button aria-label="Go back to login" class="absolute left-lg text-primary hover:opacity-80 transition-opacity flex items-center gap-2 p-2 rounded-lg hover:bg-surface-variant/50">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
<span class="font-label-lg text-label-lg">Back to Login</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary">Velvoria</h1>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center p-md md:p-2xl relative overflow-hidden">
<!-- Abstract Background Element (Subtle Luxury Decor) -->
<div class="absolute top-0 right-0 w-[400px] h-[400px] bg-secondary-fixed opacity-20 rounded-full blur-[100px] -z-10 translate-x-1/3 -translate-y-1/3 pointer-events-none"></div>
<div class="absolute bottom-0 left-0 w-[300px] h-[300px] bg-primary-fixed opacity-20 rounded-full blur-[80px] -z-10 -translate-x-1/3 translate-y-1/3 pointer-events-none"></div>
<!-- Forgot Password Card -->
<div class="w-full max-w-[440px] bg-white rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.08)] p-xl md:p-2xl flex flex-col relative z-0">
<!-- Icon/Header Group -->
<div class="flex flex-col items-center mb-xl text-center">
<div class="w-16 h-16 rounded-full bg-surface-container-low flex items-center justify-center mb-lg border border-surface-variant">
<span class="material-symbols-outlined text-[32px] text-primary" style="font-variation-settings: 'wght' 300;">lock_reset</span>
</div>
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-md">
                    Forgot Password
                </h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[320px] mx-auto leading-relaxed">
                    Enter your email address below and we'll send you instructions to reset your password.
                </p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-lg w-full" method="POST">
<!-- Email Input Group -->
<div class="flex flex-col gap-sm">
<label class="font-label-lg text-label-lg text-text-primary" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant text-[20px] pointer-events-none">mail</span>
<input class="w-full h-12 pl-10 pr-4 bg-white border border-border-subtle rounded-lg font-body-md text-body-md text-text-primary placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/10 focus:border-primary transition-shadow" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
</div>
<!-- Actions Group -->
<div class="flex flex-col gap-md mt-sm">
<!-- Primary CTA -->
<button class="w-full h-12 bg-secondary-fixed-dim hover:bg-secondary-fixed text-on-surface font-title-sm text-title-sm rounded-lg flex items-center justify-center transition-colors shadow-sm hover:shadow-md duration-300 group relative overflow-hidden" type="submit">
<span class="relative z-10 flex items-center gap-2">
                            Reset Password
                            <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
<!-- Subtle hover overlay -->
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
</button>
<!-- Secondary Action -->
<a class="w-full h-12 bg-transparent hover:bg-surface-light border border-transparent hover:border-border-subtle text-text-primary font-title-sm text-title-sm rounded-lg flex items-center justify-center transition-all duration-300" href="#">
                        Return to Login
                    </a>
</div>
</form>
</div>
