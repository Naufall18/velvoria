<body class="bg-surface min-h-screen font-body-lg text-text-primary flex flex-col antialiased">
<!-- TopAppBar: Transactional Page so nav shell is suppressed based on the filter logic. 
         However, the prompt asks for the Velvoria brand logo at the top. We will use the TopAppBar component styling.
         The prompt also explicitly requested TopAppBar and BottomNavBar.
         Wait, "Automatic Suppression: You MUST exclude the navigation shell if the page intent is: Linear/Transactional: Login...".
         I will follow the strict rule to hide BottomNav but keep TopAppBar for brand logo as requested by "Use the Velvoria brand logo at the top."
    -->
<header class="bg-surface dark:bg-surface-dim w-full top-0 shadow-sm dark:shadow-none z-40 fixed">
<div class="flex items-center justify-between px-md h-nav-height-mobile w-full">
<button class="text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed font-bold tracking-tight">Velvoria</h1>
<div class="w-6 h-6"></div> <!-- Spacer for center alignment -->
</div>
</header>
<main class="flex-grow flex items-center justify-center pt-nav-height-mobile px-md md:px-lg pb-4xl">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-md p-lg md:p-xl flex flex-col gap-lg border border-border-subtle/50 mt-xl">
<div class="text-center space-y-sm">
<h2 class="font-headline-lg text-headline-lg text-primary font-bold">Create Account</h2>
<p class="font-body-md text-body-md text-text-secondary">Join Velvoria for an exclusive shopping experience.</p>
</div>
<!-- Toggle -->
<div class="flex p-xs bg-surface-container rounded-lg gap-xs"><button class="flex-1 py-sm rounded font-label-lg text-label-lg text-on-surface-variant text-center hover:text-primary transition-colors">Login</button><button class="flex-1 py-sm rounded bg-surface-container-lowest shadow-sm font-label-lg text-label-lg text-primary text-center">Sign Up</button></div>
<form class="flex flex-col gap-md"><div class="flex flex-col gap-xs"><label class="font-label-lg text-label-lg text-text-primary" for="full-name">Full Name</label><input class="w-full px-md py-sm border border-border-subtle rounded-lg bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-body-md text-body-md" id="full-name" placeholder="Enter your full name" type="text"/></div><div class="flex flex-col gap-xs"><label class="font-label-lg text-label-lg text-text-primary" for="email">Email Address</label><input class="w-full px-md py-sm border border-border-subtle rounded-lg bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-body-md text-body-md" id="email" placeholder="Enter your email" type="email"/></div><div class="flex flex-col gap-xs"><label class="font-label-lg text-label-lg text-text-primary" for="password">Password</label><div class="relative"><input class="w-full px-md py-sm border border-border-subtle rounded-lg bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent font-body-md text-body-md" id="password" placeholder="Create a password" type="password"/><button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button"><span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span></button></div></div><button class="w-full py-md mt-sm bg-secondary-container text-on-secondary-container rounded-lg font-label-lg text-label-lg hover:opacity-90 transition-opacity shadow-sm flex items-center justify-center gap-sm" style="background-color: #E8B4A0; color: #301408;" type="submit">Register<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span></button></form>
<div class="flex items-center gap-md">
<hr class="flex-grow border-border-subtle"/>
<span class="font-label-md text-label-md text-text-secondary uppercase tracking-wider">Or continue with</span>
<hr class="flex-grow border-border-subtle"/>
</div>
<div class="flex flex-col gap-sm">
<button class="w-full py-sm border border-border-subtle rounded-lg bg-surface-container-lowest font-label-lg text-label-lg text-primary hover:bg-surface transition-colors flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" data-icon="mail">mail</span> <!-- Generic placeholder for Google -->
                    Google
                </button>
<button class="w-full py-sm border border-border-subtle rounded-lg bg-primary text-on-primary font-label-lg text-label-lg hover:opacity-90 transition-opacity flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" data-icon="apple">apps</span>
                    Apple
                </button>
</div>
</div>
